<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Generate Icons</title>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const sizes = [16, 48, 128];
    
    sizes.forEach(size => {
      const canvas = document.getElementById('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      
      // Background gradient
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#3498db');
      gradient.addColorStop(1, '#2980b9');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      
      // Calculator icon
      ctx.fillStyle = 'white';
      const padding = size * 0.2;
      const iconSize = size - padding * 2;
      
      // Screen
      ctx.fillRect(padding, padding, iconSize, iconSize * 0.3);
      
      // Buttons (3x3 grid)
      const buttonSize = iconSize / 4;
      const buttonGap = buttonSize * 0.2;
      const startY = padding + iconSize * 0.35;
      
      for (let row = 0; row < 3; row++) {
        for (let col = 0; col < 3; col++) {
          const x = padding + col * (buttonSize + buttonGap);
          const y = startY + row * (buttonSize + buttonGap);
          ctx.fillRect(x, y, buttonSize, buttonSize);
        }
      }
      
      // Download
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `icon${size}.png`;
        a.click();
      });
    });
  </script>
</body>
</html>
