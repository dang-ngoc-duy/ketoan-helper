<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeToan Helper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🧮 KeToan Helper</h1>
    
    <!-- VAT Calculator -->
    <section class="section">
      <h2>Tính VAT</h2>
      <div class="input-group">
        <input type="text" id="amount" placeholder="Nhập số tiền" />
        <select id="vat-type">
          <option value="add-8">+ VAT 8%</option>
          <option value="add-10">+ VAT 10%</option>
          <option value="remove-8">- VAT 8%</option>
          <option value="remove-10">- VAT 10%</option>
        </select>
      </div>
      <div class="result" id="vat-result">
        <div><strong>Tiền hàng:</strong> <span id="base-amount">0</span> đ</div>
        <div><strong>Thuế VAT:</strong> <span id="vat-amount">0</span> đ</div>
        <div><strong>Tổng tiền:</strong> <span id="total-amount">0</span> đ</div>
      </div>
      <button id="copy-vat">📋 Copy kết quả</button>
    </section>

    <!-- Number to Text -->
    <section class="section">
      <h2>Đọc số tiền</h2>
      <div class="input-group">
        <input type="text" id="number-input" placeholder="Nhập số tiền" />
        <button id="convert-number">🔄 Chuyển đổi</button>
      </div>
      <div class="result" id="text-result"></div>
      <button id="copy-text" style="display: none;">📋 Copy</button>
    </section>

    <!-- Multi-Clipboard -->
    <section class="section">
      <h2>Clipboard</h2>
      <div class="tabs">
        <button class="tab active" data-tab="saved">Dữ liệu cố định</button>
        <button class="tab" data-tab="history">Lịch sử</button>
      </div>
      
      <div id="saved-tab" class="tab-content active">
        <div id="saved-list"></div>
        <button id="add-saved">+ Thêm mới</button>
      </div>
      
      <div id="history-tab" class="tab-content">
        <div id="history-list"></div>
        <button id="clear-history">🗑️ Xóa lịch sử</button>
      </div>
    </section>

    <!-- Keyboard Shortcuts -->
    <section class="section shortcuts">
      <h3>⌨️ Phím tắt</h3>
      <ul>
        <li><kbd>Ctrl+Shift+C</kbd> - Mở VAT Calculator</li>
        <li><kbd>Ctrl+Shift+T</kbd> - Đọc số tiền (bôi đen số)</li>
        <li><kbd>Ctrl+Shift+V</kbd> - Mở Clipboard</li>
      </ul>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
